name: CI/CD Portfolio - Vercel

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

concurrency:
  group: portfolio-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  NODE_VERSION: "20"
  # Vercel requiere estas variables de entorno en sistemas CI
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  quality:
    name: Quality checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check formatting
        run: npm run format:check --if-present

      - name: Check lint
        run: npm run lint --if-present

      - name: Check TypeScript
        run: npx tsc --noEmit

      - name: Run tests
        run: npm run test --if-present

      # Opcional: Puedes quitar este build si quieres ahorrar minutos,
      # ya que Vercel hará el suyo propio en los jobs de deploy.
      - name: Build project (Dry Run)
        run: npm run build

  deploy-preview:
    name: Deploy Preview to Vercel
    needs: quality
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel preview environment
        run: vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build preview with Vercel
        run: vercel build --yes --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy preview
        run: |
          preview_url=$(vercel deploy --prebuilt --yes --token=${{ secrets.VERCEL_TOKEN }})
          echo "Preview deployed to: $preview_url"
          echo "PREVIEW_URL=$preview_url" >> $GITHUB_ENV

  deploy-production:
    name: Deploy Production to Vercel
    needs: quality
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    environment:
      name: production
      # Opcionalmente, podrías agregar 'url: ${{ env.PROD_URL }}' aquí
      # si extraes la URL como en el paso de preview.

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel production environment
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build production with Vercel
        run: vercel build --prod --yes --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy production
        run: |
          prod_url=$(vercel deploy --prebuilt --prod --yes --token=${{ secrets.VERCEL_TOKEN }})
          echo "Production deployed to: $prod_url"
          echo "PROD_URL=$prod_url" >> $GITHUB_ENV
