name: Deploy to Vercel - CI/CD

on:
  push:
    branches:
      - main
      - develop
    pull_request:
      branches:
        - main

concurrency:
  group: portfolio-${{ github.workflow }}-${{ github.ref}}
  cancel-in-progress: true

permissions:
  contents: read
  pull-request: read

env:
  NODE_VERSION: "20"

jobs:
  quality:
    name: Quality checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Lint
        run: npm run lint

      - name: Check TypeScript
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

deploy-preview:
  name: Deploy Preview
  needs: quality
  runs-on: ubuntu-latest
  if: github.ref == 'refs/heads/develop'

  steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Desploy production
      run: npx vercel --yes --token=${{ secrets.VERCEL_TOKEN }}

deploy-production:
  name: Deploy Production
  needs: quality
  runs-on: ubuntu-latest
  if: github.ref == 'refs/heads/main'

  environment:
    name: production

  steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Desploy production to Vercel
      run: npx vercel --prod --yes --token=${{ secrets.VERCEL_TOKEN }}
